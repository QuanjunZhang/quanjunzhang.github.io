name: Get Citation Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Restore previous citation data
        run: |
          mkdir -p ./google_scholar_crawler/results
          git fetch origin google-scholar-stats:refs/remotes/origin/google-scholar-stats || true
          git show origin/google-scholar-stats:gs_data.json > ./google_scholar_crawler/results/gs_data.json || rm -f ./google_scholar_crawler/results/gs_data.json
          git show origin/google-scholar-stats:gs_data_shieldsio.json > ./google_scholar_crawler/results/gs_data_shieldsio.json || rm -f ./google_scholar_crawler/results/gs_data_shieldsio.json

      - name: Generate Google Scholar citation data
        timeout-minutes: 10
        run: |
          if [ -z "${GOOGLE_SCHOLAR_ID}" ]; then
            echo "::error::Missing GOOGLE_SCHOLAR_ID"
            exit 1
          fi

          cd ./google_scholar_crawler
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python main.py
        env:
          GOOGLE_SCHOLAR_ID: zRzZ8HwAAAAJ

      - name: Publish citation data
        run: |
          cd ./google_scholar_crawler/results
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Updated Citation Data"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:google-scholar-stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
